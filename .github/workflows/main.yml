name: Build for cPanel
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install & Build
        run: |
          npm install
          npm run build
      - name: Zip Dist
        run: zip -r build-files.zip dist
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: my-dist-folder
          path: build-files.zip
